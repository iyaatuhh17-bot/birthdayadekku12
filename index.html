<!DOCTYPE html>
<html>
<head>
  <title>For You 🎁</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial;
      overflow: hidden;
      text-align: center;
    }

    /* LOADING */
    #loading {
      position: absolute;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .loader {
      width: 60px;
      height: 60px;
      border: 5px solid #333;
      border-top: 5px solid #ff4081;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* CONTENT */
    #content {
      display: none;
      position: absolute;
      top: 40%;
      width: 100%;
    }

    button {
      padding: 12px 20px;
      border: none;
      border-radius: 10px;
      background: #ff4081;
      color: white;
      margin-top: 20px;
      font-size: 16px;
    }

    /* MONKEY */
    #monkey {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      font-size: 120px;
      opacity: 0;
      transition: 0.3s;
    }

    .showMonkey {
      transform: translate(-50%, -50%) scale(1.6);
      opacity: 1;
    }

    /* BIRTHDAY */
    #birthday {
      display: none;
      position: absolute;
      width: 100%;
      top: 30%;
    }

    h1 {
      animation: fade 2s infinite alternate;
    }

    @keyframes fade {
      from { opacity: 0.4; }
      to { opacity: 1; }
    }

    .balloon {
      position: absolute;
      bottom: -100px;
      width: 40px;
      height: 50px;
      border-radius: 50%;
      animation: float 8s linear infinite;
    }

    @keyframes float {
      to { transform: translateY(-110vh); }
    }

    canvas {
      position: absolute;
      top: 0;
      left: 0;
    }
  </style>
</head>
<body>

<!-- LOADING -->
<div id="loading">
  <div class="loader"></div>
  <p>Menyiapkan sesuatu spesial...</p>
</div>

<!-- CONTENT -->
<div id="content">
  <h2 id="nama"></h2>
  <p>Hari ini bukan hari biasa 🎉</p>
  <button onclick="start()">Buka 🎁</button>
</div>

<!-- MONKEY -->
<div id="monkey">🐒</div>

<!-- BIRTHDAY -->
<div id="birthday">
  <h1>🎉 Happy Birthday 🎂</h1>
  <p>Semoga panjang umur & bahagia selalu ❤️</p>
</div>

<canvas id="confetti"></canvas>

<audio id="music" loop>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

<script>
// 🎯 GANTI NAMA DI SINI
let nama = "Dea imupp";
document.getElementById("nama").innerText = "Hai " + nama + " 😊";

// LOADING
setTimeout(() => {
  document.getElementById("loading").style.display = "none";
  document.getElementById("content").style.display = "block";
}, 2500);

// START
function start() {
  document.getElementById("content").style.display = "none";

  let m = document.getElementById("monkey");
  m.classList.add("showMonkey");

  // SHAKE EFFECT
  let i = 0;
  let shake = setInterval(() => {
    m.style.transform =
      "translate(-50%, -50%) scale(1.6) rotate(" + (i%2==0?5:-5) + "deg)";
    i++;
  }, 100);

  setTimeout(() => {
    clearInterval(shake);
    m.style.display = "none";

    showBirthday();
  }, 1500);
}

// SHOW BIRTHDAY
function showBirthday() {
  document.getElementById("birthday").style.display = "block";
  document.getElementById("music").play();
  startEffects();
}

// BALLOON
function createBalloon() {
  let b = document.createElement("div");
  b.className = "balloon";
  b.style.left = Math.random()*100 + "vw";
  b.style.background = `hsl(${Math.random()*360},70%,60%)`;
  b.style.animationDuration = (5+Math.random()*5)+"s";
  document.body.appendChild(b);
  setTimeout(()=>b.remove(),8000);
}

// CONFETTI
const canvas = document.getElementById("confetti");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let pieces = [];
for (let i=0;i<120;i++){
  pieces.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    r:Math.random()*5+2,
    d:Math.random()*5+2
  });
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.beginPath();
  for(let p of pieces){
    ctx.moveTo(p.x,p.y);
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
  }
  ctx.fillStyle="white";
  ctx.fill();

  for(let p of pieces){
    p.y+=p.d;
    if(p.y>canvas.height){
      p.y=0;
      p.x=Math.random()*canvas.width;
    }
  }
}

// START EFFECT
function startEffects(){
  setInterval(createBalloon,500);
  setInterval(draw,30);
}
</script>

</body>
</html>
